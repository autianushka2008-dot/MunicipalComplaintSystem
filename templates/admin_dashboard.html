<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<h2>Admin Dashboard</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Category</th> <!-- Show the type of complaint -->
    <th>Status</th>   <!-- Status set by municipal staff -->
    <th>Feedback</th> <!-- Optional feedback given by user -->
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td> <!-- Name -->
    <td>{{ row[1] }}</td> <!-- Email -->
    <td>{{ row[2] }}</td> <!-- Category (Garbage / Water / Light) -->
    <td>{{ row[3] }}</td> <!-- Status -->
    <td>{{ row[4] if row[4] else 'No Feedback' }}</td> <!-- Feedback -->
</tr>
{% endfor %}
</table>

</body>
</html>
