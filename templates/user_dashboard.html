<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>


<h2>Your Complaint Status</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Email</th>
<th>Complaint</th>
<th>Status</th>
</tr>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>

</tr>

{% endfor %}

</table>
<a href="/submit">Submit New Complaint</a> | <a href="/track">Track Complaint</a>
</body>
</html>
