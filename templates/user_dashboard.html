<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<h2>Welcome to Your Dashboard</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Category</th>
<th>Status</th>
<th>Priority</th>
<th>Feedback</th>
</tr>

{% for c in data %}
<tr>
<td>{{ c['id'] }}</td>
<td>{{ c['category'] }}</td>
<td>{{ c['status'] }}</td>
<td>{{ c['priority'] }}</td>
<td>
{% if c['status']=="Resolved" %}
<form method="POST" action="/feedback/{{c['id']}}">
<textarea name="feedback" required>{{c['feedback']}}</textarea>
<input type="hidden" name="email" value="{{email}}">
<button type="submit">Submit Feedback</button>
</form>
{% else %}
-
{% endif %}
</td>
</tr>
{% endfor %}
</table>

<a href="/submit">Submit New Complaint</a> | <a href="/track">Track Complaint</a>
</body>
</html>
