<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>


<h2>Your Complaint Status</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Category</th>
<th>Status</th>
</tr>

{% for row in data %}

<tr>

<td>{{ row[1] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[8] }}</td>

</tr>

{% endfor %}

</table>
