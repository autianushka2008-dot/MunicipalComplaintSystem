<!DOCTYPE html>
<html>
<head>
    <title>Municipal Staff Dashboard</title>
    <!-- Optional CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Municipal Staff Dashboard</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Category</th>
<th>Priority</th>
<th>Current Status</th>
<th>Feedback</th>
<th>Update Status</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
<td>{{ row[8] }}</td>
<td>{{ row[9] }}</td>

<!-- Status Update Form -->
<td>
<form action="/update_status/{{ row[0] }}" method="POST">
  <select name="status">
    <option value="Pending" {% if row[8]=='Pending' %}selected{% endif %}>Pending</option>
    <option value="In Progress" {% if row[8]=='In Progress' %}selected{% endif %}>In Progress</option>
    <option value="Completed" {% if row[8]=='Completed' %}selected{% endif %}>Completed</option>
  </select>
  <button type="submit">Update</button>
</form>
</td>

</tr>
{% endfor %}
</table>
